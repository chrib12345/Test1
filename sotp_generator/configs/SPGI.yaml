    (CME 27%) is deducted at fair value (27% x Indices EV). Mobility Global (MBGL) is valued as the
    spin entity and carries ~$1.85B net debt at separation.
  judgment_calls:
    - "Peer-comp base multiples by segment (Ratings 21.5x, Indices 25x, Market Intel 15x, Commodity 18x, Mobility 14x)."
    - "2026E segment growth (6-8% org cc guide) and ~+40bps margin; EBITDA bridge from adjusted operating profit + depreciation."
    - "Net debt marked to spin: 3/31/26 net debt $11,508M + buyback roll-forward + Mobility-notes leakage = ~$12,058M."
    - "Indices minority (CME 27%) deducted at fair value, not the $4,917M carrying value."
    - "Mobility net debt at spin ~$1,850M ($2.0B notes less ~$150M retained cash)."

